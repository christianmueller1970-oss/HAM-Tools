server {
    listen 80;
    server_name toolbox.funkwelt.net;
    # Certbot fügt hier den HTTPS-Redirect ein
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name toolbox.funkwelt.net;

    # SSL – wird von Certbot befüllt
    ssl_certificate     /etc/letsencrypt/live/toolbox.funkwelt.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toolbox.funkwelt.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/toolbox;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caching für statische Assets
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Sicherheits-Header
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
